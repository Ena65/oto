<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シンプル音ゲー</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    text-align: center;
    font-family: sans-serif;
  }

  h1 {
    margin: 10px;
  }

  #game {
    position: relative;
    width: 300px;
    height: 500px;
    margin: 20px auto;
    background: #222;
    border: 3px solid white;
    overflow: hidden;
  }

  .lane {
    position: absolute;
    width: 25%;
    height: 100%;
    border-left: 1px solid #444;
  }

  .lane:nth-child(1) { left: 0%; }
  .lane:nth-child(2) { left: 25%; }
  .lane:nth-child(3) { left: 50%; }
  .lane:nth-child(4) { left: 75%; }

  .note {
    position: absolute;
    width: 70px;
    height: 20px;
    border-radius: 10px;
    left: 50%;
    transform: translateX(-50%);
  }

  .lane0 .note { background: cyan; }
  .lane1 .note { background: lime; }
  .lane2 .note { background: orange; }
  .lane3 .note { background: pink; }

  #judgeLine {
    position: absolute;
    bottom: 50px;
    width: 100%;
    height: 5px;
    background: red;
  }

  #score {
    font-size: 20px;
  }

  #result {
    font-size: 24px;
    height: 30px;
    margin-top: 10px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h1>🎵 シンプル音ゲー</h1>
<div id="score">Score: 0</div>

<div id="game">
  <div class="lane"></div>
  <div class="lane"></div>
  <div class="lane"></div>
  <div class="lane"></div>
  <div id="judgeLine"></div>
</div>

<div id="result"></div>
<button onclick="startGame()">スタート</button>

<script>
const game = document.getElementById("game");
const resultText = document.getElementById("result");
const scoreText = document.getElementById("score");

let notes = [];
let score = 0;
let gameInterval;
let spawnInterval;

const speed = 4;

// ノーツ生成
function spawnNote() {
  const lane = Math.floor(Math.random() * 4);

  const note = document.createElement("div");
  note.classList.add("note");
  note.style.top = "0px";

  const laneDiv = game.children[lane];
  note.dataset.lane = lane;
  note.dataset.hit = "false";

  laneDiv.appendChild(note);
  notes.push(note);
}

// ゲーム開始
function startGame() {
  score = 0;
  notes = [];
  scoreText.innerText = "Score: 0";
  resultText.innerText = "";

  clearInterval(gameInterval);
  clearInterval(spawnInterval);

  spawnInterval = setInterval(spawnNote, 800);

  gameInterval = setInterval(updateGame, 16);
}

// 更新処理
function updateGame() {
  notes.forEach((note, index) => {
    let top = parseInt(note.style.top);
    top += speed;
    note.style.top = top + "px";

    if (top > 450) {
      if (note.dataset.hit === "false") {
        resultText.innerText = "Miss";
      }
      note.remove();
      notes.splice(index, 1);
    }
  });
}

// 判定
document.addEventListener("keydown", (e) => {
  const keyMap = {
    "d": 0,
    "f": 1,
    "j": 2,
    "k": 3
  };

  const lane = keyMap[e.key];
  if (lane === undefined) return;

  let bestNote = null;
  let bestDiff = 999;

  notes.forEach(note => {
    if (parseInt(note.dataset.lane) === lane && note.dataset.hit === "false") {
      let diff = Math.abs(450 - parseInt(note.style.top));
      if (diff < bestDiff) {
        bestDiff = diff;
        bestNote = note;
      }
    }
  });

  if (bestNote) {
    bestNote.dataset.hit = "true";
    bestNote.remove();

    if (bestDiff < 15) {
      resultText.innerText = "Perfect!";
      score += 100;
    } else if (bestDiff < 40) {
      resultText.innerText = "Good!";
      score += 50;
    } else {
      resultText.innerText = "Miss";
    }

    scoreText.innerText = "Score: " + score;
  }
});
</script>

</body>
</html>
